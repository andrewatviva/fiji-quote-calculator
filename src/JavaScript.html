    function getSortedItineraryEvents() {
        const events = [];
        const numAdults = parseInt(ui.inputs.numAdults.value) || 0;
        const numChildren = parseInt(ui.inputs.numChildren.value) || 0;
 
        const getAllocatedPassengers = (type, index) => {
            const allocated = [];
            for (let p = 1; p <= numAdults; p++)
            	if (document.getElementById(`${type}-${index}-pax-adult-${p}`)?.checked) allocated.push(document.getElementById(`adult-name-${p}`).value.trim() || `Adult ${p}`);
            for (let p = 1; p <= numChildren; p++)
            	if (document.getElementById(`${type}-${index}-pax-child-${p}`)?.checked) allocated.push(`${document.getElementById(`child-name-${p}`).value.trim() || `Child ${p}`} (Child${document.getElementById(`child-age-${p}`).value ? ', Age ' + document.getElementById(`child-age-${p}`).value : ''})`);
            return allocated;
        };
 
        if (ui.weddingPackage.addSelect.value === 'Yes') {
            const dateStr = ui.weddingPackage.dateInput.value;
            // Always push, even if date is missing
            events.push({
            	date: dateStr ? moment(dateStr, config.dateFormat) : moment.invalid(),
            	type: 'wedding',
            	data: {
                	date: dateStr,
                	name: ui.weddingPackage.nameInput.value,
                	inclusions: ui.weddingPackage.inclusionsInput.value
            	}
            });
        }
 
        const numFlights = parseInt(ui.flights.numInput.value) || 0;
        for (let i = 1; i <= numFlights; i++) {
            const dateStr = document.getElementById(`flight-date-${i}`).value;
            // UPDATED: Push flight even if dateStr is empty
            events.push({
            	date: dateStr ? moment(dateStr, config.dateFormat) : moment.invalid(),
            	type: 'flight',
            	data: {
                	date: dateStr,
                	number: document.getElementById(`flight-number-${i}`).value,
                	depCity: document.getElementById(`flight-dep-city-${i}`).value,
                	depTime: document.getElementById(`flight-dep-time-${i}`).value,
                	arrCity: document.getElementById(`flight-arr-city-${i}`).value,
                	arrTime: document.getElementById(`flight-arr-time-${i}`).value,
                	flightClass: document.getElementById(`flight-class-${i}`).value,
                	baggage: document.getElementById(`flight-baggage-${i}`).value,
                	passengers: getAllocatedPassengers('flight', i)
            	}
            });
        }
 
        const numTransfers = parseInt(ui.transfers.numInput.value) || 0;
        for (let i = 1; i <= numTransfers; i++) {
            const dateStr = document.getElementById(`transfer-date-${i}`).value;
            events.push({
            	date: dateStr ? moment(dateStr, config.dateFormat) : moment.invalid(),
            	type: 'transfer',
            	data: {
                	date: dateStr,
                	type: document.getElementById(`transfer-type-${i}`).value,
                	depPoint: document.getElementById(`transfer-dep-point-${i}`).value,
                	depTime: document.getElementById(`transfer-dep-time-${i}`).value,
                	arrPoint: document.getElementById(`transfer-arr-point-${i}`).value,
                	arrTime: document.getElementById(`transfer-arr-time-${i}`).value,
                	inclusions: document.getElementById(`transfer-inclusions-${i}`).value,
                	instructions: document.getElementById(`transfer-instructions-${i}`).value,
                	passengers: getAllocatedPassengers('transfer', i)
            	}
            });
        }
 
        const numTours = parseInt(ui.tours.numInput.value) || 0;
        for (let i = 1; i <= numTours; i++) {
            const dateStr = document.getElementById(`tour-date-${i}`).value;
            events.push({
            	date: dateStr ? moment(dateStr, config.dateFormat) : moment.invalid(),
            	type: 'tour',
            	data: {
                	date: dateStr,
                	name: document.getElementById(`tour-name-${i}`).value,
                	description: document.getElementById(`tour-description-${i}`).value,
                	inclusions: document.getElementById(`tour-inclusions-${i}`).value,
                	passengers: getAllocatedPassengers('tour', i)
            	}
            });
        }
 
        const numHotels = parseInt(ui.inputs.numHotels.value) || 0;
        for (let i = 1; i <= numHotels; i++) {
            const checkinStr = document.getElementById(`checkin-date-${i}`).value;
            const checkoutStr = document.getElementById(`checkout-date-${i}`).value;
            let hotelName = document.getElementById(`hotel-select-${i}`).value;
            if (hotelName === 'Other') hotelName = document.getElementById(`other-hotel-name-${i}`).value.trim();
            const specialSelect = document.getElementById(`special-select-${i}`);
            const selectedSpecial = specialSelect && specialSelect.value ? JSON.parse(specialSelect.value) : null;
           
            if (hotelName) { // Only require hotel name, date can be secondary
            	events.push({
                	date: checkinStr ? moment(checkinStr, config.dateFormat) : moment.invalid(),
                	type: 'hotel-checkin',
                	data: {
                    	index: i,
                    	hotelName,
                    	checkin: checkinStr,
                    	checkout: checkoutStr,
                    	selectedSpecial: selectedSpecial
                	}
            	});
            	if (checkoutStr) {
                	events.push({
                    	date: moment(checkoutStr, config.dateFormat),
                    	type: 'hotel-checkout',
                    	data: {
                        	hotelName,
                        	date: checkoutStr
                    	}
                	});
            	}
            }
        }
 
        // Logic: Valid dates sorted by time. Invalid dates pushed to the end.
        const checkinDates = new Set(events.filter(e => e.type === 'hotel-checkin' && e.date.isValid()).map(e => e.date.format('YYYY-MM-DD')));
        const checkoutDates = new Set(events.filter(e => e.type === 'hotel-checkout' && e.date.isValid()).map(e => e.date.format('YYYY-MM-DD')));
 
        return events.sort((a, b) => {
            // Push invalid dates to the bottom
            if (!a.date.isValid() && !b.date.isValid()) return 0;
            if (!a.date.isValid()) return 1;
            if (!b.date.isValid()) return -1;
 
            const dateDiff = a.date.valueOf() - b.date.valueOf();
            if (dateDiff !== 0) return dateDiff;
           
            // Secondary sort for same-day events
            const getRank = (event) => {
            	const dateStr = event.date.format('YYYY-MM-DD');
            	switch (event.type) {
                	case 'flight': return checkoutDates.has(dateStr) ? 3 : 1;
                	case 'transfer': return 2;
                	case 'hotel-checkin': return 3;
                	case 'tour': return 4;
                	case 'wedding': return 5;
                	case 'hotel-checkout': return 1;
                	default: return 99;
            	}
            };
            return getRank(a) - getRank(b);
        });
	}

    function addDragDropListeners() {
        const items = ui.reorderModal.list.querySelectorAll('.reorder-item');
        items.forEach(item => {
            item.addEventListener('dragstart', () => item.classList.add('dragging'));
            item.addEventListener('dragend', () => item.classList.remove('dragging'));
        });
        ui.reorderModal.list.addEventListener('dragover', e => {
            e.preventDefault();
            const afterElement = getDragAfterElement(ui.reorderModal.list, e.clientY);
            const draggable = document.querySelector('.dragging');
            if (afterElement == null) ui.reorderModal.list.appendChild(draggable);
            else ui.reorderModal.list.insertBefore(draggable, afterElement);
        });
	}
 
    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.reorder-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            return (offset < 0 && offset > closest.offset) ? {
            	offset: offset,
            	element: child
            } : closest;
        }, {
            offset: Number.NEGATIVE_INFINITY
        }).element;
	}

                	// 3. Construct the Full Link

    function searchAndRenderQuotes() {
        clearTimeout(state.searchDebounceTimeout);
        const searchTerm = ui.loadQuoteModal.searchInput.value.trim();
        state.searchDebounceTimeout = setTimeout(() => {
            ui.loadQuoteModal.list.innerHTML = '';
            ui.loadQuoteModal.spinner.classList.remove('hidden');
            google.script.run
            	.withSuccessHandler(quotes => {
                    ui.loadQuoteModal.spinner.classList.add('hidden');
                	if (quotes === null) ui.loadQuoteModal.list.innerHTML = `<p class="text-red-500 p-4">Error: Received no response from the server.</p>`;
                	else if (quotes.error) ui.loadQuoteModal.list.innerHTML = `<p class="text-red-500 p-4">${quotes.error}</p>`;
                	else if (!Array.isArray(quotes)) ui.loadQuoteModal.list.innerHTML = `<p class="text-red-500 p-4">Received invalid data from server.</p>`;
                	else renderSavedQuotes(quotes);
            	})
            	.withFailureHandler(err => {
                    ui.loadQuoteModal.spinner.classList.add('hidden');
                    ui.loadQuoteModal.list.innerHTML = `<p class="text-red-500 p-4">Failed to search quotes: ${err.message}</p>`;

        }, config.searchDebounceMs);

function updateQuoteStatusDisplay(data) {
        // Remove existing display if present
        const existing = document.getElementById('quote-status-display');
        if (existing) existing.remove();
 
        // Get container
        const container = document.getElementById('quote-reference-container');
        if (!container) return;
 
        if (data.savedStatus) {
            let statusHtml = `<div id="quote-status-display" class="mt-3 pt-3 border-t border-indigo-200">`;
           
            // Status Badge Logic
            const isAccepted = data.savedStatus === 'Accepted';
            const statusColor = isAccepted ? 'text-green-800 bg-green-100 border border-green-200' : 'text-gray-700 bg-gray-100 border border-gray-200';
           
            statusHtml += `<div class="flex flex-col items-center justify-center space-y-1">
            	<span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusColor}">${data.savedStatus}</span>`;
 
            // Accepted Details
            if (isAccepted) {
            	const dateStr = data.acceptedDate ? moment(data.acceptedDate).format('D MMM YYYY, h:mm a') : 'Unknown Date';
            	const option = data.optionSelected || 'Standard';
            	statusHtml += `
                	<p class="text-xs text-indigo-900 mt-1">Accepted: <strong>${dateStr}</strong></p>
                	<p class="text-xs text-indigo-900">Option: <strong>${option}</strong></p>
            	`;
            }
           
            statusHtml += `</div></div>`;
            container.insertAdjacentHTML('beforeend', statusHtml);
        }
	}

if (overview.saleType === 'B2B') {

        populateAncillaries('flight', quoteData.flights);

        if (quoteData.weddingPackage) {

        if (quoteData.paymentSchedule) {

            psUI.depositAmount.value = ps.depositAmount || '';
            psUI.depositDueDate.value = ps.depositDueDate || '';

            if (ps.depositAmount) state.paymentScheduleManuallySet.depositAmount = true;
            if (ps.depositDueDate) state.paymentScheduleManuallySet.depositDueDate = true;
            if (ps.flightPaymentDueDate) state.paymentScheduleManuallySet.flightPaymentDueDate = true;
            if (ps.finalPaymentDueDate) state.paymentScheduleManuallySet.finalPaymentDueDate = true;
        }
        // Reset to the main/first tab so the user sees the start of the quote
    const firstTabBtn = document.querySelector('.nav-btn');
    if (firstTabBtn) firstTabBtn.click();
 
	} catch (error) {
        console.error("Error populating form:", error);
        showError("An error occurred while loading the quote data. The data may be from an older, incompatible version of the tool.");
	} finally {
        state.isLoading = false;
        calculateCost();
       
        if (savedInstantPurchaseState) {
            const toggle = document.getElementById('instant-purchase-toggle');
            if (toggle) {

            	calculateCost();

	}
