// 1. UPDATE processServerData to capture the Web App URL
function processServerData(data) {
        // Capture the Web App URL
        state.webAppUrl = data.url;
       
        if (data.masterCalcs) {
            state.masterCalcs = data.masterCalcs;
            Object.keys(data.masterCalcs).forEach(key => {
            	if (config.rates.hasOwnProperty(key)) {
                	const value = parseFloat(data.masterCalcs[key]);
                	if (!isNaN(value)) {
                    	config.rates[key] = value;
                	}
            	}
            });
        }
 
        // Load data if present, otherwise default to empty arrays (safe for Lite Mode)
        state.ratesData = processRatesData(data.rates || []);
        state.conditionsData = processConditionsData(data.conditions || []);
        state.mealPlansData = processMealPlansData(data.mealPlans || []);
        state.specialsData = data.specials || [];
        state.consultantsData = data.consultants || [];
        state.transfersData = data.transfers || [];
	}

  // 3. ADD this new function to handle the popup logic
function checkUrlForAcceptance() {
        // 1. Get Params (Server Data or URL Fallback)
        let quoteId = window.serverData && window.serverData.requestParams ? window.serverData.requestParams.q : null;
        let preSelectedOption = window.serverData && window.serverData.requestParams ? window.serverData.requestParams.opt : null;
 
        if (!quoteId) {
             const urlParams = new URLSearchParams(window.location.search);
             quoteId = urlParams.get('q');
             preSelectedOption = urlParams.get('opt');
        }
 
        if (quoteId) {
            console.log("Acceptance Mode Triggered for:", quoteId);
 
            // Hide Main App UI immediately
            document.getElementById('main-content').classList.add('hidden');
            const header = document.querySelector('header');
            if(header) header.classList.add('hidden');
           
            // ---> ADD THIS LINE HERE <---
            // Allow the page to scroll for the customer web quote view
            document.body.classList.remove('overflow-hidden');
           
            // Show a temporary loading state
            const loader = document.createElement('div');
            loader.innerHTML = '<div class="flex h-screen items-center justify-center flex-col"><div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div><p class="text-gray-600">Loading your quote...</p></div>';
            document.body.appendChild(loader);
 
            // Fetch Quote Data
            google.script.run.withSuccessHandler((quoteData) => {
            	loader.remove(); // Remove loader
            	
            	if (!quoteData || quoteData.error) {
                	alert("Error loading quote. It may have been deleted.");
                	return;
            	}
 
            	// Populate the hidden form so we can use existing calculation logic
            	populateForm(quoteData, quoteId);
 
            	// Wait a brief moment for calculations to finish, then render the Full Web Quote
            	setTimeout(() => {
                    renderWebQuoteView(quoteData, quoteId, preSelectedOption);
            	}, 500);
 
            }).getQuote(quoteId);
        }
	}

function handleAcceptanceSubmit() {
    // CRITICAL FIX: Ensure the quoteId is read from the modal's display element,
    // which is now reliably set by window.openAcceptModal.
    const quoteId = document.getElementById('accept-quote-id').textContent;
	
    // Check for radio button (if exists) or hidden input
    const selectedRadio = document.querySelector('input[name="accept-option"]:checked');
    const hiddenInput = document.querySelector('input[name="accept-option"][type="hidden"]');
    const selectedValue = selectedRadio ? selectedRadio.value : (hiddenInput ? hiddenInput.value : null);
	
    // --- NEW: Retrieve the price from the hidden input ---
    const priceInput = document.querySelector('input[name="accept-price"]');
    const selectedPrice = priceInput ? priceInput.value : "";
	
    // Check for the dynamically created checkbox ('accept-terms-final') first,
    // then the original static one ('accept-terms') for the agent view.
    const termsCheckbox = document.getElementById('accept-terms-final') || document.getElementById('accept-terms');
    const termsChecked = termsCheckbox ? termsCheckbox.checked : false;
 
    // Get the correct button and error div from the currently active modal state.
    const errorDiv = document.getElementById('accept-error-final') || document.getElementById('accept-error');
    const btn = document.getElementById('btn-final-submit') || document.getElementById('btn-confirm-acceptance');
	
    if (!errorDiv || !btn) {
        console.error("Acceptance modal UI elements not found.");
        return; // Safety guard
	}
	
    errorDiv.classList.add('hidden');
 
    if (!selectedValue) {
        errorDiv.textContent = "Please select a booking option to proceed.";
        errorDiv.classList.remove('hidden');
        return;
	}
	
    // CRITICAL FIX: Validation check for missing quote ID.
    if (!quoteId || quoteId.trim() === '') {
        errorDiv.textContent = "Quote Reference ID is missing. Cannot proceed with acceptance.";
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = "Confirm Acceptance";
        return;
	}
	
    if (!termsChecked) {
        errorDiv.textContent = "You must read and accept the Terms and Conditions.";
        errorDiv.classList.remove('hidden');
        return;
	}
 
    btn.disabled = true;
    btn.innerHTML = `<span class="inline-block animate-spin mr-2">⟳</span> Processing...`;
 
    // The rest of the logic remains unchanged, making the Google Apps Script call
    // --- UPDATED: Passing selectedPrice as the third argument ---
    google.script.run
        .withSuccessHandler((res) => {
            if (res.error) {
                	errorDiv.textContent = res.error;

                	btn.disabled = false;

                        	<p class="text-sm text-gray-600 mb-3">For your convenience, we accept payment via the following methods:</p>
                        	<ul class="space-y-2 text-sm text-gray-700 list-disc pl-4">
                                ${PAYMENT_OPTION_1 ? `<li>${PAYMENT_OPTION_1}</li>` : ''}
                                ${PAYMENT_OPTION_2 ? `<li>${PAYMENT_OPTION_2}</li>` : ''}

    // --- DATA PROCESSING HELPERS ---
    function processRatesData(rawData) {
        const processed = {};
        rawData.forEach(item => {
            const {
            	Hotel,
            	RoomType,
            	SeasonName,
            	StartDate,
            	EndDate,
            	Rate,
            	MaxExistingBed,
            	MaxExtraBed,
            	ExtraBedCost,
            	Inclusions,
            	MarkUpOverride,
            	ExtraChildCost
            } = item;
            if (!Hotel || !RoomType) return;
            if (!processed[Hotel]) processed[Hotel] = [];
            let roomEntry = processed[Hotel].find(r => r.roomType === RoomType);
            if (!roomEntry) {
            	roomEntry = {
                	roomType: RoomType,
                	seasons: [],
                	maxExisting: MaxExistingBed || 'N/A',
                	maxExtra: MaxExtraBed || 'N/A',
                	extraBedCost: parseFloat(ExtraBedCost) || 0,
                	extraChildCost: parseFloat(ExtraChildCost) || 0
            	};
                processed[Hotel].push(roomEntry);
            }
            roomEntry.seasons.push({
            	name: SeasonName,
            	startDate: StartDate,
            	endDate: EndDate,
            	rate: parseFloat(Rate),
            	inclusions: Inclusions || '',
            	markUpOverride: parseFloat(MarkUpOverride) || null
            });
        });
        return processed;
	}
 
    function processConditionsData(rawData) {
        const processed = {};
        rawData.forEach(item => {
            if (item.Hotel) {
            	processed[item.Hotel] = {
                	hotelInfo: item.HotelInfo || '',
                	resortSpecificInfo: item.Resort_Specific_Info || '',
                	childPolicy: item.ChildPolicy || '',
                	mealPlanInfo: item.MealPlanInfo || '',
                	cancellation: item.CancellationConditions || '',
                	contractLink: item.Contract_Link || ''
            	};
            }
        });
        return processed;
	}
 
function processMealPlansData(rawData) {
        const processed = {};
        rawData.forEach(item => {
            // Hyper-tolerant column lookups (ignores spaces and exact casing)
            const getVal = (keys) => {
            	for(let key of keys) {
                	if(item[key] !== undefined && item[key] !== '') return item[key];
                	const matchedKey = Object.keys(item).find(k => k.replace(/[^a-zA-Z0-9]/g, '').toLowerCase() === key.toLowerCase());
                	if(matchedKey && item[matchedKey] !== undefined && item[matchedKey] !== '') return item[matchedKey];
            	}
            	return null;
            };
 
            const hotelName = getVal(['Hotel', 'HotelName']);
            const planName = getVal(['MealPlanName', 'MealPlan']);
            const adultCost = getVal(['AdultCost']);
            const childCost = getVal(['ChildCost']);
            const startDate = getVal(['StartDate']);
            const endDate = getVal(['EndDate']);
 
            if (!hotelName || !planName) return;
 
            const cleanHotel = String(hotelName).trim();
            if (!processed[cleanHotel]) processed[cleanHotel] = [];
 
            processed[cleanHotel].push({
            	name: planName,
            	adultCost: parseFloat(adultCost) || 0,
            	childCost: parseFloat(childCost) || 0,
            	startDate: startDate,
            	endDate: endDate
            });
        });
        return processed;
	}
 
    // --- UI GENERATION & MANIPULATION ---
    function generateHotelSections(shouldCalculate = true) {
    const newNumHotels = parseInt(ui.inputs.numHotels.value) || 1;
    const currentSections = ui.hotelSectionsContainer.querySelectorAll('[id^="hotel-section-"]');
    const currentNumHotels = currentSections.length;
 
    if (newNumHotels > currentNumHotels) {
        for (let i = currentNumHotels + 1; i <= newNumHotels; i++) {
            const hotelSectionHtml = getHotelSectionHTML(i);
            ui.hotelSectionsContainer.insertAdjacentHTML('beforeend', hotelSectionHtml);
            const checkinInput = document.getElementById(`checkin-date-${i}`);
            const checkoutInput = document.getElementById(`checkout-date-${i}`);
 
            state.hotelPickers[i] = {
            	checkin: new Pikaday({
                	field: checkinInput,
                	format: config.dateFormat,
                	minDate: new Date(),
                	// --- MODIFICATION START ---
                	// This onSelect callback now contains the logic to update the checkout date.
                	onSelect: (date) => {
                    	const checkoutPicker = state.hotelPickers[i].checkout;
                    	const nextDay = new Date(date);
                        nextDay.setDate(nextDay.getDate() + 1);
 
                    	// Update the minDate for the checkout picker to prevent invalid selections
                        checkoutPicker.setMinDate(nextDay);
 
                    	// Get the current checkout date to see if we need to update it
                    	const currentCheckoutDate = checkoutPicker.getDate();
 
                    	// If checkout date isn't set, or is now invalid (before or same as check-in),
                    	// set it to the day after the new check-in date.
                    	if (!currentCheckoutDate || currentCheckoutDate <= date) {
                            checkoutPicker.setDate(nextDay);
                    	}
 
                    	// Trigger the main calculation and UI update logic
                    	handleDateChange(i);
                	}
                	// --- MODIFICATION END ---
            	}),
            	checkout: new Pikaday({
                	field: checkoutInput,
                	format: config.dateFormat,
                	minDate: new Date(),
                	onSelect: () => handleDateChange(i)
            	})
            };
 
            populateHotelsForHotel(i);
            generateRoomInputsForHotel(i, false, false);
        }
	} else if (newNumHotels < currentNumHotels) {
        for (let i = currentNumHotels; i > newNumHotels; i--) {
            const sectionToRemove = document.getElementById(`hotel-section-${i}`);
            if (sectionToRemove) {
            	if (state.hotelPickers[i]) {
                    state.hotelPickers[i].checkin.destroy();
                    state.hotelPickers[i].checkout.destroy();
                	delete state.hotelPickers[i];
            	}
            	sectionToRemove.remove();
            }
        }
	}
    if (shouldCalculate) calculateCost();
}

function generatePassengerNameInputs() {
    const container = ui.inputs.passengerNamesContainer;

    const existingAdultNames = [];
    const existingChildData = [];
 
    // Select existing inputs to read their current values
    const existingAdultInputs = container.querySelectorAll('input[id^="adult-name-"]');
    existingAdultInputs.forEach(input => {
        existingAdultNames.push(input.value);
    });
 
    // Child inputs are paired, so we find their parent containers to read them reliably
    const childDivs = container.querySelectorAll('.grid.grid-cols-1.md\\:grid-cols-2');
    childDivs.forEach(div => {
        const nameInput = div.querySelector('input[id^="child-name-"]');
        const ageInput = div.querySelector('input[id^="child-age-"]');
        if (nameInput && ageInput) {
            existingChildData.push({
            	name: nameInput.value,
            	age: ageInput.value
            });
        }
    });
 
    // 2. Clear the container now that data is saved
    container.innerHTML = '';
 
    // 3. Get the new passenger counts
    const numAdults = parseInt(ui.inputs.numAdults.value) || 0;
    const numChildren = parseInt(ui.inputs.numChildren.value) || 0;
 
    // 4. Generate adult inputs, populating them with the saved names
    for (let i = 1; i <= numAdults; i++) {
        const div = document.createElement('div');
        // Use the stored name if available, otherwise use an empty string. Sanitize for safety.
        const nameValue = (existingAdultNames[i - 1] || '').replace(/"/g, '&quot;');
        div.innerHTML = `<label for="adult-name-${i}" class="block text-sm font-medium text-gray-700 mb-1">Adult ${i} Name</label><input type="text" id="adult-name-${i}" class="w-full p-2 border border-gray-300 rounded-lg text-sm passenger-name-input" placeholder="Full Name" value="${nameValue}">`;
        container.appendChild(div);
	}
 
    // 5. Generate child inputs, populating them with the saved names and ages
    if (numChildren > 0) {
        container.insertAdjacentHTML('beforeend', '<hr class="my-4">');
        for (let i = 1; i <= numChildren; i++) {
            const div = document.createElement('div');
            div.className = 'grid grid-cols-1 md:grid-cols-2 gap-4 items-end';
            // Use stored child data if available
            const childData = existingChildData[i - 1] || { name: '', age: '' };
            const nameValue = (childData.name || '').replace(/"/g, '&quot;');
            const ageValue = (childData.age || '').replace(/"/g, '&quot;');
            div.innerHTML = `<div><label for="child-name-${i}" class="block text-sm font-medium text-gray-700 mb-1">Child ${i} Name</label><input type="text" id="child-name-${i}" class="w-full p-2 border border-gray-300 rounded-lg text-sm passenger-name-input" placeholder="Full Name" value="${nameValue}"></div><div><label for="child-age-${i}" class="block text-sm font-medium text-gray-700 mb-1">Child ${i} Age</label><input type="number" id="child-age-${i}" min="0" max="17" class="w-full p-2 border border-gray-300 rounded-lg text-sm passenger-name-input" placeholder="Age" value="${ageValue}"></div>`;
            container.appendChild(div);
        }
	}
 
    // 6. Re-add event listeners to the new inputs
    document.querySelectorAll('.passenger-name-input').forEach(el => el.addEventListener('input', () => {
        updateAllPassengerAllocations();
    }));
}
 
    function generatePassengerAllocationInputsForHotel(hotelIndex) {

    function generateSectors(type, container, pickers, numInput, shouldCalculate = true) {
        const newNumSectors = parseInt(numInput.value) || 0;
        const currentNumSectors = container.children.length;
 
        // 1. If we are ADDING sectors (e.g., changing from 1 to 2)
        if (newNumSectors > currentNumSectors) {
            for (let i = currentNumSectors + 1; i <= newNumSectors; i++) {
            	const sectorDiv = document.createElement('div');
            	// REMOVED duplicate borders/padding to allow accordion to style cleanly
            	sectorDiv.className = 'w-full mb-4';
            	let htmlContent = '';
            	if (type === 'flight') htmlContent = getFlightSectorHTML(i);
            	else if (type === 'transfer') htmlContent = getTransferSectorHTML(i);
            	else if (type === 'tour') htmlContent = getTourSectorHTML(i);
            	sectorDiv.innerHTML = htmlContent;
                container.appendChild(sectorDiv);
 
            	// Configuration for the Pikaday date picker
            	const pikadayConfig = {
                	field: document.getElementById(`${type}-date-${i}`),
                	format: config.dateFormat
            	};
 
            	// If the sector is a transfer, add an onSelect handler to trigger a recalculation
            	if (type === 'transfer') {
                	pikadayConfig.onSelect = () => handleContractTransferChange(i);
            	}
 
            	const datePicker = new Pikaday(pikadayConfig);
            	pickers.push(datePicker);
 
            	// If it's a transfer, populate the company dropdown
            	if (type === 'transfer') {
                    populateTransferCompanies(i);
            	}
 
                generatePassengerAllocation(type, i);
            }
        }
        // 2. If we are REMOVING sectors (e.g., changing from 3 to 2)
        else if (newNumSectors < currentNumSectors) {
            for (let i = currentNumSectors; i > newNumSectors; i--) {
            	// Remove the last DOM element from the screen
            	const sectorToRemove = container.lastElementChild;
            	if (sectorToRemove) {
                	sectorToRemove.remove();
            	}
            	
            	// Destroy and remove the last date picker instance to prevent memory leaks
            	const pickerToDestroy = pickers.pop();
            	if (pickerToDestroy) {
                	pickerToDestroy.destroy();
            	}
            }
        }
       
        // Only run calculations if required
        if (shouldCalculate) calculateCost();
	}

function calculateContractTransferPrice(sectorIndex) {
    let totalFjdNett = 0;
    const company = document.getElementById(`transfer-company-${sectorIndex}`).value;
    const dateStr = document.getElementById(`transfer-date-${sectorIndex}`).value;
    const date = moment(dateStr, config.dateFormat);
 
    if (!company || !date.isValid()) {
        return { gross: 0, nett: 0 };
	}
 
    // 1. Calculate Base Transfer Price (Group or Per Person)
    const type = document.getElementById(`transfer-contract-type-${sectorIndex}`).value;
    const from = document.getElementById(`transfer-from-${sectorIndex}`).value;
    const to = document.getElementById(`transfer-to-${sectorIndex}`).value;
 
    if (type && from && to) {
        const rateInfo = state.transfersData.find(t =>
            t.Transfer_Company === company &&
            t.Transfer_Type === type &&
            t.From === from &&
            t.To === to &&
            t.Pricing_Model !== 'AddOn' &&
            date.isBetween(moment(t.StartDate), moment(t.EndDate), null, '[]')
        );
 
        if (rateInfo) {
            let baseCost = 0;
            const transferRate = parseFloat(rateInfo.Transfer_Rate) || 0;
            const transferFee = parseFloat(rateInfo.Transfer_Fee) || 0;
 
            if (rateInfo.Pricing_Model === 'Group') {
            	baseCost = transferRate + transferFee;
            } else { // 'Per Person'
            	const numAdults = parseInt(document.getElementById(`transfer-pax-adults-${sectorIndex}`).value) || 0;
            	const numChildren = parseInt(document.getElementById(`transfer-pax-children-${sectorIndex}`).value) || 0;
            	const childRate = parseFloat(rateInfo.Transfer_Rate_Child) || 0;
            	const passengerCost = (numAdults * transferRate) + (numChildren * childRate);
            	baseCost = passengerCost + transferFee;
            }
            totalFjdNett += baseCost;
        }
	}
 
    // 2. Calculate Add-on Prices
    const addonCheckboxes = document.querySelectorAll(`#transfer-addons-container-${sectorIndex} .transfer-addon-checkbox:checked`);
    addonCheckboxes.forEach(checkbox => {
        // Use decodeURIComponent to correctly handle special characters from the data attribute.
        const addOnName = decodeURIComponent(checkbox.dataset.addonName);
        const numAdults = parseInt(document.getElementById(`${checkbox.id}-adults`).value) || 0;
        const numChildren = parseInt(document.getElementById(`${checkbox.id}-children`).value) || 0;
 
        // **FIX:** Find the addon rate by matching 'Transfer_Type' with the addOnName.
        const addOnRateInfo = state.transfersData.find(t =>
            t.Transfer_Company === company &&
            t.Pricing_Model === 'AddOn' &&
            t.Transfer_Type === addOnName && // <-- CORRECTED LINE
            date.isBetween(moment(t.StartDate), moment(t.EndDate), null, '[]')
        );
 
        if (addOnRateInfo) {
            const adultRate = parseFloat(addOnRateInfo.Transfer_Rate) || 0;
            const childRate = parseFloat(addOnRateInfo.Transfer_Rate_Child) || 0;
            totalFjdNett += (numAdults * adultRate) + (numChildren * childRate);
        }
    });
 
    // 3. Final Price Conversion and Markup
    if (totalFjdNett === 0) return { gross: 0, nett: 0 };
 
    const fjdNettWithTax = totalFjdNett * (1 + config.rates.FIJI_TAX);
    const audNett = fjdNettWithTax / config.rates.AUD_TO_FJD;
    const audGross = audNett / config.rates.ACCOM_MARKUP_DIVISOR;
 
    return {
        gross: roundUp(audGross),
        nett: audNett
    };
}
 
    // --- AUTOCOMPLETE LOGIC (RESTORED FROM ORIGINAL) ---
    function setupAutocompleteListeners() {
        const middleForm = ui.forms.middle;
 
        // Use event delegation for dynamically created inputs
        middleForm.addEventListener('input', (e) => {
            if (e.target.classList.contains('autocomplete-location-input')) {
                handleAutocompleteInput(e.target);
            }
        });
 
        // Handle keyboard navigation for autocomplete
        middleForm.addEventListener('keydown', (e) => {
            const input = e.target;
            if (input.classList.contains('autocomplete-location-input')) {
            	const resultsContainer = input.nextElementSibling;
            	if (!resultsContainer || resultsContainer.classList.contains('hidden')) return;
 
            	const items = resultsContainer.querySelectorAll('.autocomplete-item');
            	if (items.length === 0) return;
 
            	let activeIndex = -1;
            	const activeItem = resultsContainer.querySelector('.active');
            	if (activeItem) {
                	activeIndex = Array.from(items).indexOf(activeItem);
            	}
 
            	if (e.key === 'ArrowDown') {
                	e.preventDefault();
                	activeIndex = (activeIndex + 1) % items.length;
                	updateActiveItem(items, activeIndex);
            	} else if (e.key === 'ArrowUp') {
                	e.preventDefault();
                	activeIndex = (activeIndex - 1 + items.length) % items.length;
                	updateActiveItem(items, activeIndex);
            	} else if (e.key === 'Enter') {
                	e.preventDefault();
                	if (activeIndex > -1) {
                        items[activeIndex].click();
                	} else {
                    	hideAllAutocomplete();
                	}
            	} else if (e.key === 'Escape') {
                	hideAllAutocomplete();
            	}
            }
        });
 
        // Handle clicks on autocomplete items
        middleForm.addEventListener('click', (e) => {
            if (e.target.classList.contains('autocomplete-item')) {
            	const input = e.target.closest('.relative').querySelector('input');
            	input.value = e.target.textContent;
            	hideAllAutocomplete();
            }
        });
 
        // Hide autocomplete when clicking anywhere else on the page
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
            	hideAllAutocomplete();
            }
        });
	}
 
    function updateActiveItem(items, activeIndex) {
        items.forEach(item => item.classList.remove('active'));
        if (activeIndex > -1) {
            items[activeIndex].classList.add('active');
            items[activeIndex].scrollIntoView({
            	block: 'nearest'
            });
        }
	}
 
    function handleAutocompleteInput(inputElement) {
        const value = inputElement.value.trim().toLowerCase();
        const resultsContainer = inputElement.nextElementSibling;
 
        if (value.length < 2) {
            resultsContainer.innerHTML = '';
            resultsContainer.classList.add('hidden');
            return;
        }
 
        const numHotels = parseInt(ui.inputs.numHotels.value) || 0;
        const currentHotels = [];
        for (let i = 1; i <= numHotels; i++) {
            const hotelSelect = document.getElementById(`hotel-select-${i}`);
            let hotelName = '';
            if (hotelSelect) {
            	if (hotelSelect.value === 'Other') {
                	hotelName = document.getElementById(`other-hotel-name-${i}`).value.trim();
            	} else {
                	hotelName = hotelSelect.value;
            	}
            }
            if (hotelName && !currentHotels.includes(hotelName)) {
            	currentHotels.push(hotelName);
            }
        }
 
        const suggestions = [...new Set([...commonFijiLocations, ...currentHotels])];
        const filtered = suggestions.filter(item => item.toLowerCase().includes(value));
 
        if (filtered.length > 0) {
            resultsContainer.innerHTML = filtered.map(item => {
            	const regex = new RegExp(`(${value})`, 'gi');
            	const highlightedText = item.replace(regex, '<strong>$1</strong>');
            	return `<div class="autocomplete-item">${highlightedText}</div>`;
            }).join('');
            resultsContainer.classList.remove('hidden');
        } else {
            resultsContainer.innerHTML = '';
            resultsContainer.classList.add('hidden');
        }
	}
 
    function hideAllAutocomplete() {
        document.querySelectorAll('.autocomplete-results').forEach(el => {

            el.classList.add('hidden');
        });

    // --- CORE CALCULATION LOGIC ---
    function calculateCost() {
        if (state.isLoading) return;
        clearResults();
        let grandTotals = {
            standard: { accomGross: 0, accomNett: 0, accomFjdNettWithTax: 0, mealFjdNett: 0 },
            special: { accomGross: 0, accomNett: 0, accomFjdNettWithTax: 0, mealFjdNett: 0 }
        };
        let allDailyBreakdowns = [];
        let anySpecialApplied = false;
 
        const numHotels = parseInt(ui.inputs.numHotels.value) || 1;
        for (let h = 1; h <= numHotels; h++) {
            const specialSelect = document.getElementById(`special-select-${h}`);
            const currentSelection = specialSelect ? specialSelect.value : null;
            findAndDisplaySpecialsForStay(h, currentSelection);
            const rehydratedSpecialSelect = document.getElementById(`special-select-${h}`);
            const selectedSpecial = rehydratedSpecialSelect && rehydratedSpecialSelect.value ? JSON.parse(rehydratedSpecialSelect.value) : null;
            if (selectedSpecial) anySpecialApplied = true;
 
            const stayResult = calculateStayCost(h, selectedSpecial);
            if (!stayResult) return;
 
            grandTotals.standard.accomGross += stayResult.standard.accomGross;
            grandTotals.standard.accomNett += stayResult.standard.accomNett;
            grandTotals.standard.accomFjdNettWithTax += stayResult.standard.accomFjdNettWithTax;
            grandTotals.standard.mealFjdNett += stayResult.standard.mealFjdNett;
            grandTotals.special.accomGross += stayResult.special.accomGross;
            grandTotals.special.accomNett += stayResult.special.accomNett;
            grandTotals.special.accomFjdNettWithTax += stayResult.special.accomFjdNettWithTax;
            grandTotals.special.mealFjdNett += stayResult.special.mealFjdNett;
            allDailyBreakdowns.push(...stayResult.dailyBreakdowns);
        }
 
        let totalTransferGross = 0;
        let totalTransferNett = 0;
        const numTransfers = parseInt(ui.transfers.numInput.value) || 0;
        for (let i = 1; i <= numTransfers; i++) {
            const mode = document.querySelector(`input[name="transfer-mode-${i}"]:checked`)?.value;
            const grossInput = document.getElementById(`transfer-gross-price-${i}`);
            const nettInput = document.getElementById(`transfer-nett-price-${i}`);
            if (mode === 'Contract') {
            	const { gross, nett } = calculateContractTransferPrice(i);
            	grossInput.value = gross > 0 ? gross.toFixed(2) : '0';
            	nettInput.value = nett > 0 ? nett.toFixed(2) : '0';
            	totalTransferGross += gross;
            	totalTransferNett += nett;
            } else {
            	const dynamicGross = parseFloat(document.getElementById(`transfer-dynamic-gross-price-${i}`).value) || 0;
            	const dynamicNett = parseFloat(document.getElementById(`transfer-dynamic-nett-price-${i}`).value) || 0;
            	grossInput.value = dynamicGross.toFixed(2);
            	nettInput.value = dynamicNett.toFixed(2);
            	totalTransferGross += dynamicGross;
            	totalTransferNett += dynamicNett;
            }
        }
 
        const finalTotals = grandTotals.special;
        const mealFjdNettWithTax = finalTotals.mealFjdNett * (1 + config.rates.FIJI_TAX);
        const mealAudNett = mealFjdNettWithTax / config.rates.AUD_TO_FJD;
        const mealAudGross = finalTotals.mealFjdNett > 0 ? roundUp(mealAudNett / config.rates.MEAL_MARKUP_DIVISOR) : 0;
        const transferAudGross = totalTransferGross;
        const transferAudNett = totalTransferNett;
 
        const weddingAudGross = parseFloat(ui.weddingPackage.grossPriceInput.value) || 0;
        const weddingAudNett = parseFloat(ui.weddingPackage.nettPriceInput.value) || 0;
 
        const tourAudGross = parseFloat(ui.tours.priceInput.value) || 0;
        const tourAudNett = parseFloat(ui.tours.nettPriceInput.value) || 0;
        const flightAudGross = parseFloat(ui.flights.priceInput.value) || 0;
        const flightAudNett = parseFloat(ui.flights.nettPriceInput.value) || 0;
        const bookingFee = parseFloat(ui.inputs.bookingFee.value) || 0;
        const discountAmount = parseFloat(ui.inputs.discountAmount.value) || 0;
 
        const totalGross = roundUp(finalTotals.accomGross) + mealAudGross + transferAudGross + weddingAudGross + tourAudGross + flightAudGross + bookingFee;
        const totalSell = totalGross - discountAmount;
        const totalNett = finalTotals.accomNett + mealAudNett + transferAudNett + weddingAudNett + tourAudNett + flightAudNett;
       
        const grossCommission = totalSell - totalNett;
        const isB2B = ui.inputs.saleType.value === 'B2B';
        let agentLandCommission = 0, agentFlightCommission = 0, finalCommission = grossCommission;
 
        if (isB2B) {
            if (!state.commissionOverridden.land) {
            	// FIXED: Included weddingAudGross here so agents get 10% commission on the wedding gross amount
            	const commissionableLandGross = roundUp(finalTotals.accomGross) + transferAudGross + tourAudGross + weddingAudGross + bookingFee - discountAmount;
                ui.inputs.b2b.landCommissionAmount.value = Math.max(0, (commissionableLandGross * 0.10)).toFixed(2);
            }
            if (!state.commissionOverridden.flight) {
                ui.inputs.b2b.flightCommissionAmount.value = (flightAudGross * 0.00).toFixed(2);
            }
            agentLandCommission = parseFloat(ui.inputs.b2b.landCommissionAmount.value) || 0;
            agentFlightCommission = parseFloat(ui.inputs.b2b.flightCommissionAmount.value) || 0;
            finalCommission = grossCommission - agentLandCommission - agentFlightCommission;
        } else {
            ui.inputs.b2b.landCommissionAmount.value = '0';
            ui.inputs.b2b.flightCommissionAmount.value = '0';
            state.commissionOverridden.land = false;
            state.commissionOverridden.flight = false;
            ui.inputs.b2b.resetLandCommission.classList.add('hidden');
            ui.inputs.b2b.resetFlightCommission.classList.add('hidden');
        }
 
        const margin = totalSell > 0 ? (finalCommission / totalSell) * 100 : 0;
 
        const prices = {
            totalSell,
            accomGross: roundUp(finalTotals.accomGross),
            mealGross: mealAudGross,
            weddingGross: weddingAudGross,
            transferGross: transferAudGross,
            tourGross: tourAudGross,
            flightGross: flightAudGross,
            bookingFee,
            totalNett: roundUp(totalNett),
            accomNett: roundUp(finalTotals.accomNett),
            mealNett: roundUp(mealAudNett),
            weddingNett: roundUp(weddingAudNett),
            transferNett: roundUp(transferAudNett),
            tourNett: roundUp(tourAudNett),
            flightNett: roundUp(flightAudNett),
            fjdAccomNettWithTax: roundUp(finalTotals.accomFjdNettWithTax),
            fjdMealNettWithTax: roundUp(mealFjdNettWithTax),
            fjdWeddingNett: roundUp(weddingAudNett * config.rates.AUD_TO_FJD),
            fjdTransferNett: roundUp(transferAudNett * config.rates.AUD_TO_FJD),
            fjdTourNett: roundUp(tourAudNett * config.rates.AUD_TO_FJD),
            fjdFlightNett: roundUp(flightAudNett * config.rates.AUD_TO_FJD),
            commission: roundUp(finalCommission),
            margin,
            isB2B,
            agentTotalCommission: agentLandCommission + agentFlightCommission,
        };
 
        if (anySpecialApplied) {
            const standardMealAudGross = (grandTotals.standard.mealFjdNett * (1 + config.rates.FIJI_TAX) / config.rates.AUD_TO_FJD) / config.rates.MEAL_MARKUP_DIVISOR;
            // FIXED: Added weddingAudGross to standardGross calculation so savings are calculated correctly when a wedding is present
            const standardGross = roundUp(grandTotals.standard.accomGross) + standardMealAudGross + transferAudGross + weddingAudGross + tourAudGross + flightAudGross + bookingFee;
            prices.savings = standardGross - totalGross;
        }
 
        // --- INSTANT PURCHASE CALCULATION LOGIC ---
        const instantToggle = document.getElementById('instant-purchase-toggle');
        // Only calculate/display if toggle exists and is checked
        if (instantToggle && instantToggle.checked) {
            // 1. Calculate Land Portion of Nett (Total Nett - Flight Nett)
            const landNett = prices.totalNett - prices.flightNett;
           
            // 2. Calculate New Land Gross for 13% Margin
            // Formula: Price = Cost / (1 - Margin) -> Price = Cost / 0.87
            const instantLandGross = landNett / 0.87;
           
            // 3. Calculate Total Instant Gross (New Land Gross + Flight Gross + Booking Fee)
            // Note: We ignore the manual 'Discount' field for Instant Purchase pricing unless otherwise specified.
            const instantTotalGross = instantLandGross + prices.flightGross + prices.bookingFee;
           
            // 4. Calculate Instant Commission & Margin
            const instantCommissionAmount = instantTotalGross - prices.totalNett;
            const instantMarginPercent = instantTotalGross > 0 ? (instantCommissionAmount / instantTotalGross) * 100 : 0;
           
            // 5. Calculate Savings (Difference between Flexible Price and Instant Price)
            // Flexible Price = prices.totalSell (which is Gross - Discount)
            const instantSavings = prices.totalSell - instantTotalGross;
 
            // Attach to prices object
            prices.instant = {
            	totalPrice: instantTotalGross,
            	gross: instantTotalGross,
            	nett: prices.totalNett, // Nett remains the same
            	commission: instantCommissionAmount,
            	margin: instantMarginPercent,
            	savings: instantSavings
            };
        }
 
        updatePaymentSchedule(prices.totalSell, prices.flightGross);
        updateInstantPurchaseToggle(prices);
        displayResults(prices, allDailyBreakdowns);
	}
 
    function calculateStayCost(h, selectedSpecial) {
        // --- 1. Get all necessary DOM elements and their values ---
        const hotelSelect = document.getElementById(`hotel-select-${h}`);
        const checkinInput = document.getElementById(`checkin-date-${h}`);
        const checkoutInput = document.getElementById(`checkout-date-${h}`);
        const numRoomsInput = document.getElementById(`num-rooms-${h}`);
        if (!hotelSelect || !checkinInput || !checkoutInput || !numRoomsInput) return null;
 
        const hotel = hotelSelect.value;
        const checkinDate = moment(checkinInput.value, config.dateFormat);
        const checkoutDate = moment(checkoutInput.value, config.dateFormat);
        const numRooms = parseInt(numRoomsInput.value) || 1;
 
        // --- 2. Validate the basic inputs (hotel and dates) ---
        const emptyResult = {
            standard: {
            	accomGross: 0,
            	accomNett: 0,
            	accomFjdNettWithTax: 0,
            	mealFjdNett: 0
            },
            special: {
            	accomGross: 0,
            	accomNett: 0,
            	accomFjdNettWithTax: 0,
            	mealFjdNett: 0
            },
            dailyBreakdowns: []
        };
 
        if (!hotel || !checkinDate.isValid() || !checkoutDate.isValid() || numRooms < 1) {
            return emptyResult;
        }
        if (checkoutDate.isSameOrBefore(checkinDate)) {
            showError(`For Hotel Stay ${h}, check-out date must be after check-in date.`);
            return null;
        }
 
        // --- 3. Determine if the stay should be priced dynamically ---
        let isDynamicFromSeason = false;
        // Check if the selected dates fall into a "Dynamic" season for the selected room type.
        if (hotel && hotel !== 'Other') {
            for (let i = 1; i <= numRooms; i++) {
            	const roomType = document.getElementById(`room-type-select-${h}-${i}`)?.value;
            	if (!roomType) continue; // Skip if no room type is selected yet.
 
            	const roomData = state.ratesData[hotel].find(r => r.roomType === roomType);
            	if (roomData && roomData.seasons) {
                	let currentDate = checkinDate.clone();
                	while (currentDate.isBefore(checkoutDate)) {
                    	const season = getSeasonForDate(roomData.seasons, currentDate);
                    	// **FIX:** Check for season name robustly (case-insensitive and trimmed).
                    	if (season && season.name && season.name.trim().toLowerCase() === 'dynamic') {
                        	isDynamicFromSeason = true;
                        	break; // Exit date loop
                    	}
                    	currentDate.add(1, 'day');
                	}
            	}
            	if (isDynamicFromSeason) break; // Exit room loop
            }
        }
 
        const overrideCheckbox = document.getElementById(`dynamic-override-checkbox-${h}`);
        const isManualHotel = hotel === 'Other';
        const isDynamicOverride = overrideCheckbox && overrideCheckbox.checked;
 
        // A stay is dynamic if it's a manual hotel, a dynamic season is found, or the user manually overrides.
        const isStayDynamic = isManualHotel || isDynamicFromSeason || isDynamicOverride;
 
        // --- 4. Update the UI based on whether the stay is dynamic ---
        // Hide the manual override checkbox if rates are already dynamic or it's a manual hotel.
        document.getElementById(`dynamic-override-wrapper-${h}`).classList.toggle('hidden', isDynamicFromSeason || isManualHotel);
        // Show the dynamic rate entry box ONLY if the stay is determined to be dynamic.
        document.getElementById(`dynamic-rate-container-${h}`).classList.toggle('hidden', !isStayDynamic);
 
        // --- 5. Call the correct calculation function ---
        if (isStayDynamic) {
            // Update the instructional text in the dynamic rate box.
            const dynamicReasonText = document.querySelector(`#dynamic-rate-container-${h} p`);
            if (dynamicReasonText) {
            	if (isManualHotel) {
                    dynamicReasonText.textContent = "You've selected a manual hotel entry. Please enter the room type(s) below and the total price for the stay.";
            	} else if (isDynamicOverride) {
                    dynamicReasonText.textContent = "You are manually overriding the rate. Please enter the total price for this stay.";
            	} else {
                    dynamicReasonText.textContent = "This hotel stay falls into a dynamic period. Please enter the total price for this stay.";
            	}
            }
            // Calculate using the manually entered dynamic prices.
            const dynamicResult = calculateDynamicStay(h, checkinDate, checkoutDate);
            return {
            	standard: dynamicResult,
            	special: dynamicResult,
            	dailyBreakdowns: dynamicResult.dailyBreakdowns
            };
        } else {
            // Calculate using the standard contract rates from the spreadsheet.
            return calculateStandardStay(h, checkinDate, checkoutDate, numRooms, selectedSpecial);
        }
	}
 
 
    function calculateDynamicStay(h, checkinDate, checkoutDate) {
        let result = {
            accomGross: 0,
            accomNett: 0,
            accomFjdNettWithTax: 0,
            mealFjdNett: 0,
            dailyBreakdowns: []
        };
        result.accomGross = parseFloat(document.getElementById(`dynamic-gross-price-${h}`).value) || 0;
        result.accomNett = parseFloat(document.getElementById(`dynamic-nett-price-${h}`).value) || 0;
result.accomFjdNettWithTax = result.accomNett * config.rates.AUD_TO_FJD;
 
        let hotel = document.getElementById(`hotel-select-${h}`).value;
        if (hotel === 'Other') {
            const otherInput = document.getElementById(`other-hotel-name-${h}`);
            hotel = otherInput ? otherInput.value.trim() : '';
        }
        const numRooms = parseInt(document.getElementById(`num-rooms-${h}`).value) || 1;
        for (let i = 1; i <= numRooms; i++) {
            result.mealFjdNett += calculateMealCostForRoom(h, i, hotel, checkinDate, checkoutDate);
        }
 
        result.dailyBreakdowns.push({
            hotel: h,
            room: 'N/A',
            date: `${checkinDate.format('D MMM')} - ${checkoutDate.format('D MMM YY')}`,
            name: '<span class="font-bold text-red-600">Dynamic/Manual</span>',
            rate: result.accomNett * config.rates.AUD_TO_FJD,
            inclusions: document.getElementById(`dynamic-inclusions-${h}`).value,
            nightlyAudGross: result.accomGross
        });
        return result;
	}
 
function calculateStandardStay(h, checkinDate, checkoutDate, numRooms, selectedSpecial) {
        let standardResult = {
            accomGross: 0,
            accomNett: 0,
            accomFjdNettWithTax: 0,
            mealFjdNett: 0
        };
        let specialResult = {
            accomGross: 0,
            accomNett: 0,
            accomFjdNettWithTax: 0,
            mealFjdNett: 0
        };
        let dailyBreakdowns = [];
 
        const hotel = document.getElementById(`hotel-select-${h}`).value;
        const saleType = ui.inputs.saleType.value;
 
        for (let i = 1; i <= numRooms; i++) {
            const roomType = document.getElementById(`room-type-select-${h}-${i}`)?.value;
            if (!roomType) continue;
            const roomData = state.ratesData[hotel].find(r => r.roomType === roomType);
            if (!roomData) continue;
 
            const numExtraAdults = parseInt(document.getElementById(`extra-adult-input-${h}-${i}`).value) || 0;
            const numExtraChildren = parseInt(document.getElementById(`extra-child-input-${h}-${i}`).value) || 0;
            const extraPersonCost = roomData.extraBedCost || 0;
            const extraChildCost = roomData.extraChildCost || 0;
 
            let roomDailyRates = [];
            let currentDate = checkinDate.clone();
           
            // 1. First Pass: Collect all rates per night
            while (currentDate.isBefore(checkoutDate)) {
            	const season = getSeasonForDate(roomData.seasons, currentDate);
            	if (!season || season.name === 'Dynamic') {
                	showError(`No valid rate found for Room ${i} (Hotel ${h}) on ${currentDate.format(config.dateFormat)}.`);
                	return null;
            	}
            	let extraCost = (extraChildCost > 0) ? (numExtraAdults * extraPersonCost) + (numExtraChildren * extraChildCost) : (numExtraAdults + numExtraChildren) * extraPersonCost;
            	let nightlyAccomFjd = season.rate + extraCost;
 
            	roomDailyRates.push({
                	date: currentDate.clone(),
                	season: season,
                	rate: nightlyAccomFjd
            	});
            	currentDate.add(1, 'day');
            }
 
            // 2. Identify "Free" nights if a Stay/Pay special is active
            // (We do this before the main loop so we know exactly which nights are $0)
            let freeNightIndices = [];
            if (selectedSpecial && selectedSpecial.RoomType === roomType) {
             	const stay = parseInt(selectedSpecial.Stay) || 0;
             	const pay = parseInt(selectedSpecial.Pay) || 0;
             	if (stay > 0 && pay > 0 && stay > pay) {
                 	const freeNights = stay - pay;
                 	// Find indices of the cheapest nights to mark as free
                 	const sortedIndices = roomDailyRates.map((day, idx) => ({rate: day.rate, index: idx}))
                                                         .sort((a, b) => a.rate - b.rate);
                 	for(let k=0; k<freeNights; k++) {
                     	if(sortedIndices[k]) freeNightIndices.push(sortedIndices[k].index);
                 	}
             	}
            }
 
            // 3. Second Pass: Calculate Totals and Breakdown line-by-line
            roomDailyRates.forEach((day, dayIndex) => {
            	// --- Standard Calculation ---
            	let stdDayFjdWithTax = day.rate * (1 + config.rates.FIJI_TAX);
            	let stdDayAudNett = stdDayFjdWithTax / config.rates.AUD_TO_FJD;
            	
            	// Determine divisor for this specific night (handling seasonal overrides)
            	let divisor = config.rates.ACCOM_MARKUP_DIVISOR;
            	if (saleType === 'B2C' && day.season.markUpOverride) {
                	divisor = day.season.markUpOverride;
            	}
            	let stdDayAudGross = stdDayAudNett / divisor;
 
            	// Accumulate Standard Totals
            	standardResult.accomGross += stdDayAudGross;
            	standardResult.accomNett += stdDayAudNett;
                standardResult.accomFjdNettWithTax += stdDayFjdWithTax;
 
            	// --- Special Calculation ---
            	let specialDayFjd = day.rate;
            	let isFree = freeNightIndices.includes(dayIndex);
            	
            	// Handle Special Fixed Rate (e.g. $500/night flat rate)
            	if (selectedSpecial && selectedSpecial.RoomType === roomType) {
                	const specialRate = parseFloat(selectedSpecial.SpecialRate) || 0;
                	const stay = parseInt(selectedSpecial.Stay) || 0;
                	const pay = parseInt(selectedSpecial.Pay) || 0;
                	
                	// Only apply fixed rate if it's NOT a Stay/Pay deal
                	if (!(stay > 0 && pay > 0 && stay > pay) && specialRate > 0) {
                     	let extraCost = (extraChildCost > 0) ? (numExtraAdults * extraPersonCost) + (numExtraChildren * extraChildCost) : (numExtraAdults + numExtraChildren) * extraPersonCost;
                     	specialDayFjd = specialRate + extraCost;
                	}
            	}
            	
            	// Apply Free Night
            	if (isFree) specialDayFjd = 0;
 
            	// Convert Special FJD to AUD using the same logic
            	let specialDayFjdWithTax = specialDayFjd * (1 + config.rates.FIJI_TAX);
            	let specialDayAudNett = specialDayFjdWithTax / config.rates.AUD_TO_FJD;
            	let specialDayAudGross = specialDayAudNett / divisor; // Use the same divisor/markup logic
 
            	// Accumulate Special Totals
            	specialResult.accomGross += specialDayAudGross;
            	specialResult.accomNett += specialDayAudNett;
                specialResult.accomFjdNettWithTax += specialDayFjdWithTax;
 
            	// --- Push to Breakdown ---
            	// This now uses the calculated 'specialDayAudGross' for this specific night,
            	// ensuring the display reflects the actual rate change.
            	dailyBreakdowns.push({
                	hotel: h,
                	room: i,
                	date: day.date.format('ddd, D MMM YY'),
                	name: day.season.name + (isFree ? ' (Free)' : ''),
                	rate: specialDayFjd,
                	inclusions: day.season.inclusions,
                	nightlyAudGross: specialDayAudGross
            	});
            });
 
            const mealCost = calculateMealCostForRoom(h, i, hotel, checkinDate, checkoutDate);
            standardResult.mealFjdNett += mealCost;
            specialResult.mealFjdNett += mealCost;
        }
 
        return {
            standard: standardResult,
            special: specialResult,
            dailyBreakdowns: dailyBreakdowns
        };
	}
 
function calculateMealCostForRoom(hotelIndex, roomIndex, hotel, checkinDate, checkoutDate) {
        const mealPlanSelect = document.getElementById(`meal-plan-select-${hotelIndex}-${roomIndex}`);
        if (!mealPlanSelect || !mealPlanSelect.value) return 0;
       
        const cleanHotel = hotel ? String(hotel).trim() : '';
        const availableHotels = Object.keys(state.mealPlansData || {});
        const matchedHotelKey = availableHotels.find(h => h.trim().toLowerCase() === cleanHotel.toLowerCase());
 
        if (!matchedHotelKey || !state.mealPlansData[matchedHotelKey]) return 0;
 
        const selectedPlanName = mealPlanSelect.value;
        const numMealAdults = parseInt(document.getElementById(`meal-plan-adults-${hotelIndex}-${roomIndex}`).value) || 0;
        const numMealChildren = parseInt(document.getElementById(`meal-plan-children-${hotelIndex}-${roomIndex}`).value) || 0;
        if (numMealAdults === 0 && numMealChildren === 0) return 0;
 
        let totalMealCost = 0;
        let currentDate = checkinDate.clone();
 
        while (currentDate.isBefore(checkoutDate)) {
            const planForNight = state.mealPlansData[matchedHotelKey].find(plan => {
            	if (plan.name !== selectedPlanName) return false;
            	if (!plan.startDate || !plan.endDate) return true;
            	
            	const planStart = moment(plan.startDate);
            	const planEnd = moment(plan.endDate);
            	if (!planStart.isValid() || !planEnd.isValid()) return true;
            	
            	return currentDate.isBetween(planStart, planEnd, 'day', '[]');
            });
 
            if (planForNight) {
            	totalMealCost += (planForNight.adultCost * numMealAdults) + (planForNight.childCost * numMealChildren);
            } else {
            	return 0;
            }
            currentDate.add(1, 'day');
        }
        return totalMealCost;
	}

function findAndDisplaySpecialsForStay(hotelIndex, currentSelection = null) {
    const specialContainer = document.getElementById(`special-selector-container-${hotelIndex}`);
    const specialSelect = document.getElementById(`special-select-${hotelIndex}`);
    specialContainer.classList.add('hidden');
    specialSelect.innerHTML = '';
 
    const hotel = document.getElementById(`hotel-select-${hotelIndex}`).value;
    const checkinDate = moment(document.getElementById(`checkin-date-${hotelIndex}`).value, config.dateFormat);
    const checkoutDate = moment(document.getElementById(`checkout-date-${hotelIndex}`).value, config.dateFormat);
    const numRooms = parseInt(document.getElementById(`num-rooms-${hotelIndex}`).value) || 1;
 
    if (!hotel || !checkinDate.isValid() || !checkoutDate.isValid()) return [];
 
    const nights = checkoutDate.diff(checkinDate, 'days');
    if (nights <= 0) return [];
 
    let allApplicableSpecials = [];
    for (let i = 1; i <= numRooms; i++) {
        const roomType = document.getElementById(`room-type-select-${hotelIndex}-${i}`)?.value;
        if (!roomType) continue;
 
        const applicableSpecials = state.specialsData.filter(s => {
            // --- LOGIC UPDATED HERE ---
 
            // 1. Check Sales Date (unchanged)
            // If a sales expiry date exists and it's in the past, the special is invalid.
            if (s.SalesDateExpiry && moment().isAfter(moment(s.SalesDateExpiry), 'day')) {
            	return false;
            }
 
            // 2. Define the special's travel window
            const specialStartDate = moment(s.StartDate);
            const specialEndDate = moment(s.EndDate);
 
            // 3. Validate the stay against the travel window
            // Check-in must be on or after the start date
            const isCheckinValid = checkinDate.isSameOrAfter(specialStartDate, 'day');
            // Check-out must be on or before the end date
            const isCheckoutValid = checkoutDate.isSameOrBefore(specialEndDate, 'day');
 
            // 4. Return true only if all conditions are met
            return s.Hotel === hotel &&
               	s.RoomType === roomType &&
               	nights >= (parseInt(s.MinNights) || 0) &&
               	isCheckinValid &&
               	isCheckoutValid;
           
            // --- END OF UPDATE ---
        });
        allApplicableSpecials.push(...applicableSpecials);
	}
 
    const uniqueSpecials = [...new Map(allApplicableSpecials.map(item => [JSON.stringify(item), item])).values()];
 
    if (uniqueSpecials.length > 0) {
        specialSelect.innerHTML = '<option value="">No Special Applied</option>';
        uniqueSpecials.forEach(special => {
            let optionText = `${special.SpecialName} (${special.RoomType})`;
           
            // --- MODIFICATION START ---
            // Check if there is a sales start date and if it's in the future.
            const salesStartDate = special.SalesStartDate ? moment(special.SalesStartDate) : null;
            if (salesStartDate && salesStartDate.isAfter(moment(), 'day')) {
            	// Prepend a notice to the special name in the dropdown if it's not yet valid for sale.
            	optionText = `(Starts ${salesStartDate.format('D MMM YY')}) ${optionText}`;
            }
            // --- MODIFICATION END ---
 
            const option = new Option(optionText, JSON.stringify(special));
            specialSelect.add(option);
        });
        specialContainer.classList.remove('hidden');
        if (currentSelection) specialSelect.value = currentSelection;
	}
    return uniqueSpecials;
}

function getEarliestTravelDate() {
        let earliest = null;
 
        // Helper to compare dates
        const checkDate = (dateStr) => {
            if (!dateStr) return;
            const date = moment(dateStr, config.dateFormat);
            if (date.isValid() && (!earliest || date.isBefore(earliest))) {
            	earliest = date;
            }
        };
 
        // 1. Check Hotels
        const numHotels = parseInt(ui.inputs.numHotels.value) || 0;
        for (let i = 1; i <= numHotels; i++) {
            checkDate(document.getElementById(`checkin-date-${i}`)?.value);
        }
 
        // 2. Check Flights
        const numFlights = parseInt(ui.flights.numInput.value) || 0;
        for (let i = 1; i <= numFlights; i++) {
            checkDate(document.getElementById(`flight-date-${i}`)?.value);
        }
 
        // 3. Check Transfers
        const numTransfers = parseInt(ui.transfers.numInput.value) || 0;
        for (let i = 1; i <= numTransfers; i++) {
            checkDate(document.getElementById(`transfer-date-${i}`)?.value);
        }
 
        // 4. Check Tours
        const numTours = parseInt(ui.tours.numInput.value) || 0;
        for (let i = 1; i <= numTours; i++) {
            checkDate(document.getElementById(`tour-date-${i}`)?.value);
        }
 
        // 5. Check Wedding
        if (ui.weddingPackage.addSelect.value === 'Yes') {
            checkDate(ui.weddingPackage.dateInput.value);
        }
 
        return earliest;
	}
 
function updateInstantPurchaseToggle(prices) {
    const toggleInput = document.getElementById('instant-purchase-toggle');
    if (!toggleInput) return;
 
    // Target the elements
    const toggleContainer = document.getElementById('instant-purchase-container');
    const badge = document.getElementById('instant-purchase-badge');
    const message = document.getElementById('instant-purchase-message');
 
    // Condition 1: Earliest date > 60 days from today
    const earliestDate = getEarliestTravelDate();
    const today = moment();
    const daysUntilTravel = earliestDate ? earliestDate.diff(today, 'days') : -1;
    const isDateValid = daysUntilTravel > 60;
 
    // Condition 2: Land Margin >= 18%
    const landSell = prices.totalSell - prices.flightGross;
    const landNett = prices.totalNett - prices.flightNett;
	
    let landMargin = 0;
    if (landSell > 0) {
        const landProfit = landSell - landNett;
        landMargin = (landProfit / landSell) * 100;
	}
	
    const isMarginValid = landMargin >= 18;
 
    // Apply State
    if (isDateValid && isMarginValid) {
        // Enable: Remove shading and allow interaction
        toggleInput.disabled = false;
        toggleInput.classList.remove('cursor-not-allowed');
       
        // Update container styling for visibility
        if (toggleContainer) {
            toggleContainer.classList.remove('opacity-60', 'cursor-not-allowed', 'bg-white/50', 'border-blue-200');
            toggleContainer.classList.add('bg-green-50', 'border-green-300', 'shadow-md');
        }
        toggleInput.parentElement.classList.remove('cursor-not-allowed');
 
        // Show visual cues
        if (badge) badge.classList.remove('hidden');
        if (message) message.classList.remove('hidden');
 
	} else {
        // Disable: Shade out and block interaction
        if (!state.isLoading) {
            toggleInput.checked = false;
        }
 
        toggleInput.disabled = true;
        toggleInput.classList.add('cursor-not-allowed');
       
        // Reset container styling
        if (toggleContainer) {
            toggleContainer.classList.add('opacity-60', 'cursor-not-allowed', 'bg-white/50', 'border-blue-200');
            toggleContainer.classList.remove('bg-green-50', 'border-green-300', 'shadow-md');
        }
        toggleInput.parentElement.classList.add('cursor-not-allowed');
 
         // Hide visual cues
        if (badge) badge.classList.add('hidden');
        if (message) message.classList.add('hidden');
	}
}

    function updatePaymentSchedule(totalSell, flightGross) {
        const {
            depositAmount: depositAmountInput,
            depositDueDate: depositDueDateInput,
            flightPaymentAmount: flightPaymentAmountInput,
            flightPaymentDueDate: flightPaymentDueDateInput,
            finalPaymentAmount: finalPaymentAmountInput,
            finalPaymentDueDate: finalPaymentDueDateInput
        } = ui.inputs.paymentSchedule;
 
        // Always set flight payment amount and its due date if not manually overridden
        flightPaymentAmountInput.value = flightGross > 0 ? flightGross.toFixed(2) : '';
        if (!state.paymentScheduleManuallySet.flightPaymentDueDate && flightGross > 0) {
            const flightDueDate = moment().add(3, 'days');
            flightPaymentDueDateInput.value = flightDueDate.format(config.dateFormat);
            state.paymentPickers.flight.setMoment(flightDueDate);
        } else if (flightGross <= 0) {
            flightPaymentDueDateInput.value = '';
        }
 
        // --- UPDATED LOGIC ---
        // Uses getEarliestTravelDate() to check hotels, flights, tours, etc.
        const firstTravelDate = getEarliestTravelDate();
       
        // CRITICAL FIX: Use startOf('day') to compare calendar dates only, ignoring current time of day.
        const today = moment().startOf('day');
       
        let depositAmount = 0;
        const flightAmount = parseFloat(flightPaymentAmountInput.value) || 0;
 
        // Check if we have a valid travel date to calculate from
        if (firstTravelDate) {
            // Check diff in whole calendar days
            const daysUntilTravel = firstTravelDate.diff(today, 'days');
 
            // Logic: If travel is within 60 days (<= 60), use 48hr rule.
            // If travel is more than 60 days (> 60), use 60-days-prior rule.
            if (daysUntilTravel <= 60) {
            	// --- Last-minute / Short Lead Time logic (<= 60 Days) ---
            	
            	// 1. Deposit: Generally not required as full payment is due soon.
            	// Clear it unless manually entered.
            	if (!state.paymentScheduleManuallySet.depositAmount) {
                	depositAmountInput.value = '';
            	}
            	if (!state.paymentScheduleManuallySet.depositDueDate) {
                	depositDueDateInput.value = '';
            	}
 
            	// 2. Final Payment: Due 48 hours (2 days) from NOW (Quote Creation)
            	if (!state.paymentScheduleManuallySet.finalPaymentDueDate) {
                	// Use moment() to get current time + 2 days
                	const finalDueDate = moment().add(2, 'days');
                    finalPaymentDueDateInput.value = finalDueDate.format(config.dateFormat);
                    state.paymentPickers.final.setMoment(finalDueDate);
            	}
 
            } else {
            	// --- Standard Booking Logic (> 60 Days) ---
            	
            	// 1. Deposit: Standard calculation (e.g. $250 per adult)
            	if (!state.paymentScheduleManuallySet.depositAmount) {
                	const numAdults = parseInt(ui.inputs.numAdults.value) || 0;
                	const defaultDeposit = numAdults * 250;
                	depositAmountInput.value = defaultDeposit > 0 ? defaultDeposit.toFixed(2) : '';
            	}
 
            	// Deposit Due: 3 days from now
            	if (!state.paymentScheduleManuallySet.depositDueDate) {
                	const depositDueDate = moment().add(3, 'days');
                	depositDueDateInput.value = depositDueDate.format(config.dateFormat);
                    state.paymentPickers.deposit.setMoment(depositDueDate);
            	}
 
            	// 2. Final Payment: Due 60 days prior to travel
            	if (!state.paymentScheduleManuallySet.finalPaymentDueDate) {
                	const finalDueDate = firstTravelDate.clone().subtract(60, 'days');
                    finalPaymentDueDateInput.value = finalDueDate.format(config.dateFormat);
                    state.paymentPickers.final.setMoment(finalDueDate);
            	}
            }
        } else {
            // --- Fallback if no dates selected yet ---
            // Just set a default deposit, but we can't calculate final payment date yet
            if (!state.paymentScheduleManuallySet.depositAmount) {
            	const numAdults = parseInt(ui.inputs.numAdults.value) || 0;
            	const defaultDeposit = numAdults * 250;
            	depositAmountInput.value = defaultDeposit > 0 ? defaultDeposit.toFixed(2) : '';
            }
             if (!state.paymentScheduleManuallySet.depositDueDate) {
            	const depositDueDate = moment().add(3, 'days');
            	depositDueDateInput.value = depositDueDate.format(config.dateFormat);
                state.paymentPickers.deposit.setMoment(depositDueDate);
            }
        }
 
        // Calculate final payment amount (Total - Deposit - Flights)
        depositAmount = parseFloat(depositAmountInput.value) || 0;
        const finalAmount = totalSell - depositAmount - flightAmount;
        finalPaymentAmountInput.value = finalAmount > 0 ? finalAmount.toFixed(2) : '';
	}

function handleHotelSectionChange(event) {
    const target = event.target;
    const hotelIndex = target.dataset.hotelIndex;
 
    if (target.classList.contains('hotel-selector')) {
        displayHotelInfo(hotelIndex);
	} else if (target.classList.contains('num-rooms-input')) {
        const isOther = document.getElementById(`hotel-select-${hotelIndex}`).value === 'Other';
        generateRoomInputsForHotel(hotelIndex, isOther);
        generatePassengerAllocationInputsForHotel(hotelIndex);
        calculateCost();
	} else if (target.matches('.room-type-selector, .extra-person-selector, .meal-plan-selector, .meal-plan-pax, .special-selector')) {
        if (target.classList.contains('room-type-selector')) {
            displayRoomDetails(hotelIndex, target.dataset.roomIndex);
        }
 
        // --- MODIFICATION START ---
        // This new block handles showing/hiding the warning message when a special is selected.
        if (target.classList.contains('special-selector')) {
            const warningContainer = document.getElementById(`special-warning-container-${hotelIndex}`);
            // Always hide the warning first when the selection changes.
            warningContainer.classList.add('hidden');
            warningContainer.textContent = '';
 
            if (target.value) { // Check if a special (not 'No Special') is selected.
            	try {
                	const selectedSpecial = JSON.parse(target.value);
                	const salesStartDate = selectedSpecial.SalesStartDate ? moment(selectedSpecial.SalesStartDate) : null;
 
                	// If a sales start date exists and is in the future, construct and show the warning message.
                	if (salesStartDate && salesStartDate.isAfter(moment(), 'day')) {
                        warningContainer.textContent = `Warning: This special's sales period begins on ${salesStartDate.format('D MMMM YYYY')}. It can be quoted but not sold until then.`;
                        warningContainer.classList.remove('hidden');
                	}
            	} catch (e) {
                	console.error("Error parsing selected special JSON:", e);
            	}
            }
        }
        // --- MODIFICATION END ---
       
        calculateCost();
	} else if (target.classList.contains('show-hotel-info-checkbox')) {
        document.getElementById(`hotel-details-wrapper-${hotelIndex}`).classList.toggle('hidden', !target.checked);
	} else if (target.classList.contains('dynamic-override-checkbox')) {
        calculateCost();
	}
}

    function displayHotelInfo(hotelIndex, shouldCalculate = true) {
        const hotelSelect = document.getElementById(`hotel-select-${hotelIndex}`);
        const selectedHotel = hotelSelect.value;
        const isOther = selectedHotel === 'Other';
 
        document.getElementById(`other-hotel-name-container-${hotelIndex}`).classList.toggle('hidden', !isOther);
        document.getElementById(`show-hotel-info-wrapper-${hotelIndex}`).classList.toggle('hidden', isOther);
        document.getElementById(`hotel-details-wrapper-${hotelIndex}`).classList.add('hidden');
        document.getElementById(`show-hotel-info-checkbox-${hotelIndex}`).checked = false;
        document.getElementById(`room-config-section-${hotelIndex}`).classList.toggle('hidden', !selectedHotel);
 
        if (selectedHotel && !isOther) {
            if (state.conditionsData[selectedHotel]) {
            	const policies = state.conditionsData[selectedHotel];
            	let anyPolicyDisplayed = false;
            	const policyMap = {
                	'hotel-info': policies.hotelInfo,
                	'resort-info': policies.resortSpecificInfo,
                	'child-policy': policies.childPolicy,
                	'meal-policy': policies.mealPlanInfo,
                	'cancellation': policies.cancellation,
            	};
            	for (const [key, value] of Object.entries(policyMap)) {
                	const container = document.getElementById(`${key}-container-${hotelIndex}`);
                	if (value) {
                        document.getElementById(`${key}-box-${hotelIndex}`).innerText = value;
                        container.classList.remove('hidden');
                    	anyPolicyDisplayed = true;
                	} else {
                        container.classList.add('hidden');
                	}
            	}
            	const contractLinkContainer = document.getElementById(`contract-link-container-${hotelIndex}`);
            	if (policies.contractLink) {
                    document.getElementById(`contract-link-${hotelIndex}`).href = policies.contractLink;
                    contractLinkContainer.classList.remove('hidden');
                	anyPolicyDisplayed = true;
            	} else {
                    contractLinkContainer.classList.add('hidden');
            	}
                document.getElementById(`hotel-policies-container-${hotelIndex}`).classList.toggle('hidden', !anyPolicyDisplayed);
            }
            const hotelData = state.ratesData[selectedHotel];
            if (hotelData && hotelData.length > 0 && hotelData[0].seasons) {
            	const groupedSeasons = {};
                hotelData[0].seasons.forEach(season => {
                	if (!groupedSeasons[season.name]) groupedSeasons[season.name] = [];
                	const startDate = moment(season.startDate).format('D MMM YY');
                	const endDate = moment(season.endDate).format('D MMM YY');
                    groupedSeasons[season.name].push(`${startDate} - ${endDate}`);
            	});
            	const hotelSeasonalityTbody = document.getElementById(`hotel-seasonality-tbody-${hotelIndex}`);
            	hotelSeasonalityTbody.innerHTML = '';
            	for (const seasonName in groupedSeasons) {
                	const row = document.createElement('tr');
                	row.innerHTML = `<td class="px-4 py-3 text-sm text-gray-700 ${seasonName === 'Dynamic' ? 'font-bold text-red-600' : ''}">${seasonName}</td><td class="px-4 py-3 text-sm text-gray-700">${groupedSeasons[seasonName].join(' | ')}</td>`;
                    hotelSeasonalityTbody.appendChild(row);
            	}
                document.getElementById(`hotel-seasonality-container-${hotelIndex}`).classList.remove('hidden');
            }
        }
        generateRoomInputsForHotel(hotelIndex, isOther, shouldCalculate);
	}
 
    function displayRoomDetails(hotelIndex, roomIndex) {
        const roomDetailsContainer = document.getElementById(`room-details-container-${hotelIndex}-${roomIndex}`);
        const roomType = document.getElementById(`room-type-select-${hotelIndex}-${roomIndex}`).value;
        const hotel = document.getElementById(`hotel-select-${hotelIndex}`).value;
 
        if (hotel && roomType && state.ratesData[hotel]) {
            const roomData = state.ratesData[hotel].find(r => r.roomType === roomType);
            if (roomData) {
                document.getElementById(`max-existing-bed-${hotelIndex}-${roomIndex}`).textContent = roomData.maxExisting;
                document.getElementById(`max-extra-bed-${hotelIndex}-${roomIndex}`).textContent = roomData.maxExtra;
            	const extraAdultWrapper = document.getElementById(`extra-adult-wrapper-${hotelIndex}-${roomIndex}`);
            	const extraChildWrapper = document.getElementById(`extra-child-wrapper-${hotelIndex}-${roomIndex}`);
            	const extraAdultLabel = extraAdultWrapper.querySelector('label');
 
            	if (roomData.extraChildCost > 0) {
                	extraAdultLabel.textContent = 'Extra Adults';
                    extraChildWrapper.classList.remove('hidden');
            	} else {
                	extraAdultLabel.textContent = 'Extra People';
                    extraChildWrapper.classList.add('hidden');
            	}
 
            	const extraAdultInput = document.getElementById(`extra-adult-input-${hotelIndex}-${roomIndex}`);
            	extraAdultInput.disabled = !(roomData.extraBedCost > 0);
            	if (extraAdultInput.disabled) extraAdultInput.value = 0;

function populateMealPlansForRoom(hotelIndex, roomIndex) {
        const mealPlanSelect = document.getElementById(`meal-plan-select-${hotelIndex}-${roomIndex}`);
        const mealPlanContainer = document.getElementById(`meal-plan-options-container-${hotelIndex}-${roomIndex}`);
        if (!mealPlanSelect || !mealPlanContainer) return;
 
        let hotel = document.getElementById(`hotel-select-${hotelIndex}`).value;
        if (hotel === 'Other') {
            const otherInput = document.getElementById(`other-hotel-name-${hotelIndex}`);
            hotel = otherInput ? otherInput.value.trim() : '';
        }
       
        const cleanHotel = hotel ? String(hotel).trim() : '';
 
        const checkinDateStr = document.getElementById(`checkin-date-${hotelIndex}`).value;
        const checkoutDateStr = document.getElementById(`checkout-date-${hotelIndex}`).value;
        const checkinDate = moment(checkinDateStr, config.dateFormat);
        const checkoutDate = moment(checkoutDateStr, config.dateFormat);
        const currentSelection = mealPlanSelect.value;
       
        // 1. ALWAYS SHOW THE CONTAINER IF A HOTEL IS SELECTED
        if (!cleanHotel) {
            mealPlanContainer.classList.add('hidden');
            return;
        }
        mealPlanContainer.classList.remove('hidden');
 
        // 2. DIAGNOSTIC: Find the hotel in our data (case-insensitive)
        const availableHotels = Object.keys(state.mealPlansData || {});
        const matchedHotelKey = availableHotels.find(h => h.trim().toLowerCase() === cleanHotel.toLowerCase());
 
        if (!matchedHotelKey || !state.mealPlansData[matchedHotelKey]) {
            mealPlanSelect.innerHTML = `<option value="">No Meal Plans loaded for "${cleanHotel}"</option>`;
            mealPlanSelect.disabled = true;
            return;
        }
 
        if (!checkinDate.isValid() || !checkoutDate.isValid() || checkoutDate.isSameOrBefore(checkinDate)) {
            mealPlanSelect.innerHTML = '<option value="">Enter valid dates to see Meal Plans</option>';
            mealPlanSelect.disabled = true;
            return;
        }
 
        // 3. DATE LOGIC
        const overlappingPlans = state.mealPlansData[matchedHotelKey].filter(plan => {
            if (!plan.startDate || !plan.endDate) return true;
            const planStart = moment(plan.startDate);
            const planEnd = moment(plan.endDate);
            if (!planStart.isValid() || !planEnd.isValid()) return true; // Failsafe
            return checkinDate.isSameOrBefore(planEnd, 'day') && checkoutDate.isSameOrAfter(planStart, 'day');
        });
 
        const validPlanNames = [...new Set(overlappingPlans.map(plan => plan.name))];
 
        if (validPlanNames.length > 0) {
            mealPlanSelect.innerHTML = '<option value="">Select a Meal Plan</option>';
            validPlanNames.forEach(name => {
            	const representativePlan = state.mealPlansData[matchedHotelKey].find(p => p.name === name);
            	const optionText = `${name} (A: $${representativePlan.adultCost}, C: $${representativePlan.childCost})`;
            	mealPlanSelect.add(new Option(optionText, name));
            });
            mealPlanSelect.disabled = false;
            if (validPlanNames.includes(currentSelection)) mealPlanSelect.value = currentSelection;
        } else {
            mealPlanSelect.innerHTML = '<option value="">No plans match these specific dates</option>';
            mealPlanSelect.disabled = true;
        }
	}
